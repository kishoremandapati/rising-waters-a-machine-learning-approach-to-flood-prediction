<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #cb2d3e, #ef473a);
            text-align: center;
            padding-top: 100px;
            color: white;
        }

        .card {
            background: white;
            color: black;
            width: 400px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        }

        h1 {
            color: red;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #cb2d3e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #a71d2a;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>⚠ High Flood Risk</h1>
        <h2>Predicted Probability: {{ percent }}%</h2>

        <a href="/predict">🔄 Try Again</a>
    </div>

</body>
</html>
